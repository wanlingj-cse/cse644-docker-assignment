global
    maxconn 2000
    daemon
defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s
# 前端监听80端口，接收外部请求
frontend http_front
    bind *:80
    default_backend nginx_servers
# 后端负载均衡组，指向两台Nginx容器
backend nginx_servers
    server web1 web1:80 check
    server web2 web2:80 check
